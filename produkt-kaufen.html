<!doctype html>
<html>
  <head>
    <title>Online Shop</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="produkt-kaufen.css" />
  </head>
  <body>
    <div class="kaufen-wrapper">
      <table class="kaufen-layout">
        <tr>
          <td class="bild-zelle">
            <img id="produkt-bild" src="" alt="Produktbild" />
          </td>
          <td class="details-zelle">
            <p id="produkt-name">PRODUKT-NAME</p>
            <p id="produkt-preis">PRODUKT-PREIS €</p>
            <p id="produkt-beschreibung">PRODUKT-BESCHREIBUNG</p>
            <div id="warenkorb-kaufen-und-actions">
              <button id="kaufen-button" onclick="produktKaufen()">
                In den Warenkorb
              </button>
            </div>
          </td>
        </tr>
      </table>
      <table class="technische-daten">
        <thead>
          <tr>
            <th colspan="2">Technische Daten</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="spec-label">Akkukapazität:</td>
            <td id="spec-battery">—</td>
          </tr>
          <tr>
            <td class="spec-label">Bildschirm:</td>
            <td id="spec-screen">—</td>
          </tr>
          <tr>
            <td class="spec-label">Gewicht:</td>
            <td id="spec-weight">—</td>
          </tr>
          <tr>
            <td class="spec-label">Maße:</td>
            <td id="spec-dimensions">—</td>
          </tr>
          <tr>
            <td class="spec-label">Prozessor:</td>
            <td id="spec-chip">—</td>
          </tr>
          <tr>
            <td class="spec-label">RAM:</td>
            <td id="spec-ram">—</td>
          </tr>
          <tr>
            <td class="spec-label">Speicher:</td>
            <td id="spec-storage">—</td>
          </tr>
        </tbody>
      </table>
    </div>

    <script src="script.js"></script>
    <script src="produkt-kaufen.js"></script>
  </body>
</html>
