<html>
  <head>
    <title>Warenkorb</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="warenkorb.css" />
  </head>
  <body>
    <h1>Warenkorb</h1>

    <main id="warenkorb-wrap">
      <table id="warenkorb">
        <tr>
          <th>Produkt</th>
          <th>Preis</th>
        </tr>
      </table>
      <div id="warenkorb-aktionen-wrap">
        <button id="warenkorb-leeren" onclick="warenkorbLeeren()">
          <!-- Icon von https://heroicons.com-->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            height="24px"
            width="24px"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"
            />
          </svg>

          Leeren
        </button>
        <button id="warenkorb-kaufen">
          <!-- Icon von https://heroicons.com-->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            height="24px"
            width="24px"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 0 0 2.25-2.25V6.75A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25v10.5A2.25 2.25 0 0 0 4.5 19.5Z"
            />
          </svg>

          Bezahlen
        </button>
      </div>
    </main>

    <script src="script.js"></script>
    <script src="warenkorb.js"></script>
  </body>
</html>
